services:
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,logs
      - DEFAULT_REGION=us-east-1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack-init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    command: flask db upgrade
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "5678:5678"
    volumes:
      - .:/app
    env_file:
      - .env.local
    environment:
      FLASK_APP: app
      FLASK_ENV: development
      FLASK_DEBUG: "1"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  s3-console:
    image: cloudlena/s3manager:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ENDPOINT=localstack:4566
      - ACCESS_KEY_ID=test
      - SECRET_ACCESS_KEY=test
      - USE_SSL=false
    depends_on:
      localstack:
        condition: service_healthy

volumes:
  postgres_data:
  localstack_data:
