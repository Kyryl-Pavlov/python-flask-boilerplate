# Rate limiting zones (defined at http context via conf.d include)
limit_req_zone $binary_remote_addr zone=api:10m  rate=300r/m;  # 5 req/s general
limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/m;   # strict — brute-force target

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn:10m;

upstream flask_app {
    server app:5000;
}

# ── Add new microservice upstreams here ──────────────────────────────────────
# upstream my_service {
#     server my_service:3000;
# }
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;

    # ── Security headers ─────────────────────────────────────────────────────
    # 'always' ensures headers are sent on error responses too (4xx, 5xx).
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    # HSTS — enable once TLS is configured on the ALB (uncomment then).
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    #
    # Content-Security-Policy is intentionally omitted here.
    # A CSP that covers the GraphQL playground requires careful tuning per
    # deployment (allowed origins, nonce strategy). Add it once you know
    # your frontend's origin requirements.

    # ── Suppress Nginx version in Server header ──────────────────────────────
    server_tokens off;

    # ── Slowloris mitigation ─────────────────────────────────────────────────
    client_body_timeout   10s;
    client_header_timeout 10s;
    keepalive_timeout     30s;
    send_timeout          10s;

    # ── Buffer limits (overflow / memory exhaustion) ─────────────────────────
    client_body_buffer_size     16k;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;

    # ── Connection cap per IP ────────────────────────────────────────────────
    limit_conn      conn 20;
    limit_conn_status 429;

    # ── Block non-standard HTTP methods ─────────────────────────────────────
    if ($request_method !~ ^(GET|POST|PUT|PATCH|DELETE|OPTIONS)$) {
        return 405;
    }

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Auth — strict rate limit to slow brute-force attempts
    location /api/v1/auth/ {
        limit_req        zone=auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://flask_app;
    }

    location /api/ {
        limit_req        zone=api burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://flask_app;
    }

    location /graphql {
        limit_req        zone=api burst=50 nodelay;
        limit_req_status 429;
        proxy_pass       http://flask_app;
        client_max_body_size 50m;
    }

    # Metrics — internal Docker network only (Prometheus scraper)
    location /metrics {
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny  all;
        proxy_pass http://flask_app;
    }

    # ── Add new microservice routes here ─────────────────────────────────────
    # location /my-service/ {
    #     limit_req        zone=api burst=50 nodelay;
    #     limit_req_status 429;
    #     proxy_pass http://my_service/;
    # }
    # ─────────────────────────────────────────────────────────────────────────
}
